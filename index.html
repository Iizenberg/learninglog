<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Learning Log Board</title>
<style>
body{font-family:Arial;margin:40px;background:#f4f6fb}
.post{background:white;padding:15px;margin-bottom:12px;border-radius:8px}
.meta{color:gray;font-size:12px;margin-bottom:8px}
</style>
</head>
<body>

<h1>Learning Log Bulletin Board</h1>

<a href="https://docs.google.com/forms/d/e/1FAIpQLSex8uS3e_XUzpGhmWhphMmXw8lIXoYnIhINsqQaVvsI6FrAWA/viewform?usp=publish-editor" target="_blank">
Submit Learning
</a>

<button onclick="load()">Refresh</button>

<div id="board"></div>

<script>

async function load(){
const res = await fetch("https://script.google.com/macros/s/AKfycby-pOppZjaIj8Z2RRlvOQ0dhbsloCoUoAV-lslldK3sLjZrdNnKd7mof8C7P52Ct26v/exec");
const data = await res.json();

const div = document.getElementById("board");

div.innerHTML = data.rows
.reverse()
.map(r => `
<div class="post">
<div><strong>${r.displayName}</strong></div>
<div class="meta">${new Date(r.timestamp).toLocaleString()}</div>
<div>${r.response}</div>
</div>
`).join("");

}

load();

</script>

</body>
</html>
